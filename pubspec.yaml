name: kickr
description: "Kickr — Mobile-first internship platform for students in Egypt."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Backend
  supabase_flutter: ^2.9.1

  # Environment configuration
  flutter_dotenv: ^5.2.1

  # Typography
  google_fonts: ^6.2.1

  # File picking (CV upload + avatar)
  file_picker: ^8.1.4

  # Open URLs (CV review, company website)
  url_launcher: ^6.3.1

  # Firebase (Crashlytics)
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
